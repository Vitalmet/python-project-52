{% extends 'base.html' %}
{% load django_bootstrap5 %}
{% load i18n %}

{% block title %}{% trans "Edit status" %}{% endblock %}

{% block content %}
<div class="container col-md-6">
    <h1 class="my-4">{% trans "Edit status" %}</h1>
    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        <button type="submit" class="btn btn-primary">Изменить</button>
    </form>
</div>
{% endblock %}
