{% extends 'base.html' %}
{% load django_bootstrap5 %}
{% load i18n %}

{% block content %}
<div class="container col-md-6">
    <h1 class="my-4">{% trans "Register" %}</h1>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="username" class="form-label">{% trans "Username" %}</label>
            <input type="text" class="form-control" id="username" name="username" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">{% trans "Email" %}</label>
            <input type="email" class="form-control" id="email" name="email">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">{% trans "Password" %}</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <div class="mb-3">
            <label for="password_confirm" class="form-label">{% trans "Confirm Password" %}</label>
            <input type="password" class="form-control" id="password_confirm" name="password_confirm" required>
        </div>
        <button type="submit" class="btn btn-primary">{% trans "Register" %}</button>
    </form>
    <p class="mt-3">
        {% trans "Already have an account?" %} <a href="{% url 'login' %}">{% trans "Login" %}</a>
    </p>
</div>
{% endblock %}
