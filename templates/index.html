{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="px-4 py-5 my-5 text-center">
    <h1 class="display-4 fw-bold">{% trans "Task Manager" %}</h1>
    <div class="col-lg-6 mx-auto">
        <p class="lead mb-4">
            {% trans "Manage your tasks efficiently and effectively" %}
        </p>
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a href="{% url 'register' %}" class="btn btn-primary btn-lg px-4 gap-3">
                {% trans "Get Started" %}
            </a>
            <a href="{% url 'login' %}" class="btn btn-outline-secondary btn-lg px-4">
                {% trans "Sign In" %}
            </a>
        </div>
    </div>
</div>
{% endblock %}
