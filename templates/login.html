{% extends 'base.html' %}
{% load django_bootstrap5 %}
{% load i18n %}

{% block content %}
<div class="container col-md-6">
    <h1 class="my-4">{% trans "Login" %}</h1>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="username" class="form-label">{% trans "Username" %}</label>
            <input type="text" class="form-control" id="username" name="username" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">{% trans "Password" %}</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary">{% trans "Login" %}</button>
    </form>
    <p class="mt-3">
        {% trans "Don't have an account?" %} <a href="{% url 'register' %}">{% trans "Register" %}</a>
    </p>
</div>
{% endblock %}
