{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Delete status" %}{% endblock %}

{% block content %}
<div class="container col-md-6">
    <h1 class="my-4">{% trans "Delete status" %}</h1>
    <p>{% trans "Are you sure you want to delete" %} "{{ status.name }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'statuses' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
